name: Deploy to Google Cloud Functions
run-name: Deploy to Google Cloud Functions

on: [push]

permissions:
  id-token: write
  contents: read

jobs:
  Tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  Deploy:
    runs-on: ubuntu-latest
    needs: Tests

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/676750851465/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github@boardgamegeek-bots.iam.gserviceaccount.com"

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install dependencies
        run: npm ci

      - name: Build and Deploy
        run: npm run deploy